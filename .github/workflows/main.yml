name: Coupang Auto Blogger CI
# ★★★ 이미지 업로드(GitHub 쓰기) 권한 - 이거 없으면 이미지 안 나옴! ★★★
permissions:
  contents: write
on:
  workflow_dispatch: # 👈 수동 실행 버튼 유지
  schedule:
    # 💡 UTC 기준 1시 = 한국 시간(KST) 오전 10시 / 매주 월(1), 수(3), 금(5)만 실행
    - cron: '0 1 * * 1,3,5'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    # 📦 파이썬이 구글 블로그와 제미나이를 주무를 수 있게 도구를 미리 깔아줍니다!
    # ★ Pillow 추가 (카드 이미지 생성용)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth-oauthlib google-auth-httplib2 google-api-python-client google-genai Pillow
    # 🔍 시크릿 변수가 정상적으로 로드되는지 사전 검증
    - name: Verify Secrets Integrity
      env:
        COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
        COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
      run: |
        if [ -z "$COUPANG_ACCESS_KEY" ]; then
          echo "❌ [경고] COUPANG_ACCESS_KEY 시크릿이 비어있습니다. 깃허브 설정을 확인하세요."
        else
          echo "✅ COUPANG_ACCESS_KEY 연결 확인 완료"
        fi
        if [ -z "$COUPANG_SECRET_KEY" ]; then
          echo "❌ [경고] COUPANG_SECRET_KEY 시크릿이 비어있습니다. 깃허브 설정을 확인하세요."
        else
          echo "✅ COUPANG_SECRET_KEY 연결 확인 완료"
        fi
    - name: Run Auto Post Script
      env:
        # ★★★ GITHUB_TOKEN 추가 - 이미지 업로드의 핵심! ★★★
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        API_KEY: ${{ secrets.API_KEY }}
        TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
        COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
        COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
      run: python auto_post.py
